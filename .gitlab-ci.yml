stages:
  - build
  - test
  - deploy

test:
  stage: test
  image: python:3.11
  rules:
    - if: $CI_COMMIT_BRANCH != "master"
  script:
    - pip install --no-cache-dir poetry==1.8.3
    - poetry config virtualenvs.create false
    - poetry install --no-interaction --no-ansi --no-root --with dev
    - export PYTHONPATH="$CI_PROJECT_DIR"
    - black --check .
    - mypy app
    - pytest -q -m "not integration"

integration:
  stage: test
  image: docker:24.0.5
  services:
    - name: docker:24.0.5-dind
  rules:
    - if: $CI_COMMIT_BRANCH != "master"
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apk add --no-cache python3 py3-pip bash curl
    - pip install --no-cache-dir pytest pytest-asyncio httpx
    - export PYTHONPATH="$CI_PROJECT_DIR"
  script:
    - |
      echo "Waiting for Docker daemon..."
      for i in $(seq 1 30); do
        docker info >/dev/null 2>&1 && break
        sleep 2
      done
      docker info >/dev/null 2>&1 || (echo "Docker daemon not ready" && exit 1)
    - docker compose up -d --build --wait --wait-timeout 180
    - docker compose exec -T app /bin/bash -lc 'PYTHONPATH=/app python seed.py'
    - |
      NETWORK_NAME=$(docker compose ps -q app | xargs docker inspect -f '{{range $k, $v := .NetworkSettings.Networks}}{{println $k}}{{end}}' | head -n1)
      if [ -z "$NETWORK_NAME" ]; then
        echo "Failed to resolve compose network" >&2
        exit 1
      fi
      docker run --rm \
        --network "$NETWORK_NAME" \
        -v "$CI_PROJECT_DIR":/app \
        -w /app \
        python:3.11 \
        bash -lc "pip install --no-cache-dir pytest pytest-asyncio httpx && BASE_URL=http://app:8000 pytest -q -m integration tests/test_users_integration.py"
    - |
      NETWORK_NAME=$(docker compose ps -q app | xargs docker inspect -f '{{range $k, $v := .NetworkSettings.Networks}}{{println $k}}{{end}}' | head -n1)
      docker run --rm \
        --network "$NETWORK_NAME" \
        -v "$CI_PROJECT_DIR":/app \
        -w /app \
        python:3.11 \
        bash -lc "pip install --no-cache-dir pytest pytest-asyncio httpx && BASE_URL=http://ml:8001 APP_BASE_URL=http://app:8000 pytest -q -m integration tests/test_rank_integration.py"
  after_script:
    - docker compose logs app || true
    - docker compose down -v

deploy:
  stage: deploy
  image: alpine:3.19
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
  before_script:
    - apk add --no-cache openssh-client rsync
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - |
      if [ -n "$SSH_KNOWN_HOSTS" ]; then
        echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
      else
        ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
      fi
  script:
    - ssh -o StrictHostKeyChecking=yes "$DEPLOY_USER@$DEPLOY_HOST" "sudo mkdir -p '$DEPLOY_PATH' && sudo chown -R '$DEPLOY_USER':'$DEPLOY_USER' '$DEPLOY_PATH'"
    - rsync -az --delete --exclude '.git' --exclude '.gitlab-ci.yml' --exclude 'data/' --exclude 'models/' ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
    - ssh "$DEPLOY_USER@$DEPLOY_HOST" "cd '$DEPLOY_PATH' && sudo docker compose down --remove-orphans || true"
    - ssh "$DEPLOY_USER@$DEPLOY_HOST" "sudo docker rm -f tmatch-app 2>/dev/null || true"
    - ssh "$DEPLOY_USER@$DEPLOY_HOST" "cd '$DEPLOY_PATH' && sudo docker compose up -d --build"
